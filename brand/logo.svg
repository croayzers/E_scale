<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Cubo isométrico E-scale -->
  <g stroke="#4a5568" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">
    <!-- Cara top -->
    <polygon points="60,12 100,34 60,56 20,34" fill="white" fill-opacity="0.9"/>
    <!-- Cara izquierda -->
    <polygon points="20,34 60,56 60,100 20,78" fill="#e8eaf0" fill-opacity="0.9"/>
    <!-- Cara derecha -->
    <polygon points="60,56 100,34 100,78 60,100" fill="#d0d4e0" fill-opacity="0.9"/>
    <!-- Marco cubo -->
    <polyline points="20,34 20,78 60,100 100,78 100,34"/>
    <line x1="60" y1="56" x2="60" y2="100"/>
    <polyline points="20,34 60,12 100,34"/>
  </g>
  <!-- Letras ES centradas en la cara frontal izquierda -->
  <text x="28" y="73" font-family="'Inter Tight', 'Inter', sans-serif" font-weight="700" font-size="18" fill="#4a5568" transform="skewY(-14) translate(0,8)">ES</text>
</svg>
